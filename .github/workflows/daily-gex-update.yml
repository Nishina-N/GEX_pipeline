name: Daily GEX Update

on:
  schedule:
    - cron: '30 22 * * 1-5'  # Mon-Fri 22:30 UTC (after stock-data-pipeline)
  workflow_dispatch:

concurrency:
  group: gex-pipeline
  cancel-in-progress: false  # 実行中のRunは中断しない（完了を待つ）

permissions:
  contents: read   # 記事生成・note投稿・チャートのgitコミットを廃止したため write 不要

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        timeout-minutes: 10

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 10

      - name: Create data directories
        run: mkdir -p data/options data/gex data/levels data/iv_history data/charts

      - name: 0. Screen OI surge
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/0_screen_oi_surge.py
        timeout-minutes: 30
        continue-on-error: true

      - name: Wait for yfinance rate limit cooldown
        run: sleep 120

      - name: 1. Fetch options data
        run: python scripts/1_fetch_options_data.py --symbols-from data/symbols_oi_surge.json
        timeout-minutes: 15

      - name: 2. Calculate GEX
        run: python scripts/2_calculate_gex.py
        timeout-minutes: 5

      - name: 3. Extract GEX levels
        run: python scripts/3_extract_levels.py
        timeout-minutes: 5

      - name: 4. Export to JSON
        run: python scripts/4_export_to_json.py
        timeout-minutes: 5

      - name: 5. Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/5_upload_to_r2.py
        timeout-minutes: 10

      - name: 6. Download previous day data from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/6_download_previous_data.py
        continue-on-error: true
        timeout-minutes: 5

      - name: 6. Visualize GEX
        run: python scripts/visualize_gex.py
        timeout-minutes: 5

      - name: 6. Upload charts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/5_upload_to_r2.py --charts-only
        continue-on-error: true
        timeout-minutes: 5

      # 記事生成(step7)・note投稿(step8)・チャートのgitコミットはCIから廃止。
      # 記事はローカルの対話フロー（pull_from_r2 → gex-article skill → Obsidian →
      # post_note_from_obsidian.mjs）に一本化。チャートは step6 で R2 にのみ保存する。
      # 7_generate_note_article.py / 8_post_note.mjs のスクリプト本体は残置。

      - name: Cleanup temporary data
        if: always()
        run: rm -rf data/options data/gex data/levels data/iv_history data/r2 data/charts data/symbols_oi_surge.json

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gex-pipeline-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
